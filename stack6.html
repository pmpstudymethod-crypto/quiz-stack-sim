<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stack 6 | PMP Study Method</title>
<style>
body{font-family:Arial;background:#f8fafc;margin:0}
.app{max-width:700px;margin:auto;background:#fff;border-radius:16px;padding:20px}
.q-text{font-size:18px;margin-bottom:20px}
.choice{display:block;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;cursor:pointer}
.next-btn{margin-top:20px;padding:12px;width:100%;background:#f7941d;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
</style>
</head>

<body>
<div class="app">
<h2>Stack 6 of 20</h2>

<div class="q-text" id="qText">Loading question...</div>

<div id="choices"></div>

<button class="next-btn" onclick="nextQ()">Next</button>
</div>

<script>
// ✅ YOUR QUESTIONS (SAFE WRAPPER — WILL NOT BREAK)
var QS = window.QS || [
{
q:"Placeholder question (replace with your real Stack 6 questions)",
a:["A","B","C","D"],
correct:0
}
];

// STATE
let cur = 0;
let score = 0;

// LOAD QUESTION
function loadQ(){
try{
let q = QS[cur];
if(!q){
document.getElementById("qText").innerText = "No question found.";
return;
}

document.getElementById("qText").innerText = q.q;

let choicesHTML = "";
q.a.forEach((c,i)=>{
choicesHTML += `<div class="choice" onclick="select(${i})">${c}</div>`;
});

document.getElementById("choices").innerHTML = choicesHTML;

}catch(e){
console.error(e);
document.getElementById("qText").innerText = "Error loading question.";
}
}

// SELECT
function select(i){
let correct = QS[cur].correct;
if(i === correct) score++;
}

// NEXT
function nextQ(){
cur++;
if(cur >= QS.length){
document.getElementById("qText").innerText = "Completed!";
document.getElementById("choices").innerHTML = "Score: "+score+"/"+QS.length;
return;
}
loadQ();
}

// START (FIXED — THIS WAS YOUR BUG)
document.addEventListener("DOMContentLoaded", function(){
loadQ();
});
</script>

</body>
</html>
