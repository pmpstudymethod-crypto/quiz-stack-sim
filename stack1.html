<script>

const T_START = 900;

let cur = 0;
let score = 0;
let secs = T_START;
let tOn = false;
let answered = false;
let study = false;
let streak = 0;
let bestStreak = 0;
let marked = new Set();
let startTime = null;

let order = [];
let timerInt = null;

/* =========================
   SHUFFLE
========================= */
function shfl(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================
   INIT QUESTIONS
========================= */
function initQ(){
  order = shfl([...Array(QS.length).keys()]);
}

/* =========================
   LOAD QUESTION
========================= */
function loadQ(){
  const q = QS[order[cur]];
  if(!q) return;

  document.getElementById("qText").innerText = q.q;

  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  q.c.forEach((choice,i)=>{
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<span class="choice-letter">${String.fromCharCode(65+i)}</span> ${choice}`;
    btn.onclick = ()=>select(i);
    choices.appendChild(btn);
  });

  document.getElementById("counter").innerHTML =
    `<strong>${cur+1}</strong> / ${QS.length}`;
}

/* =========================
   SELECT ANSWER
========================= */
function select(i){
  if(answered) return;

  answered = true;

  const q = QS[order[cur]];
  const choices = document.querySelectorAll(".choice");

  choices.forEach((c,idx)=>{
    if(idx === q.a){
      c.classList.add("cor");
    } else if(idx === i){
      c.classList.add("wrg");
    } else {
      c.classList.add("dim");
    }
  });

  if(i === q.a){
    score++;
    streak++;
    bestStreak = Math.max(bestStreak,streak);
  } else {
    streak = 0;
  }

  document.getElementById("nextBtn").classList.add("on");
}

/* =========================
   NEXT
========================= */
function nextQ(){
  cur++;
  answered = false;

  if(cur >= QS.length){
    finish();
    return;
  }

  loadQ();
  document.getElementById("nextBtn").classList.remove("on");
}

/* =========================
   TIMER
========================= */
function startTimer(){
  if(timerInt) return;

  timerInt = setInterval(()=>{
    secs--;

    document.getElementById("timer").innerText = secs;

    if(secs <= 0){
      clearInterval(timerInt);
      finish();
    }
  },1000);
}

/* =========================
   FINISH
========================= */
function finish(){
  clearInterval(timerInt);

  document.getElementById("app").style.display = "none";
  document.getElementById("results").classList.add("on");

  const pct = Math.round((score / QS.length) * 100);

  document.getElementById("finalScore").innerText = pct + "%";
}

/* =========================
   GATE
========================= */
function unlock(){
  localStorage.setItem("sr_access","granted");

  document.getElementById("gate").style.display = "none";

  initQ();
  loadQ();
  startTimer();
}

/* =========================
   STARTUP (CRITICAL FIX)
========================= */
document.addEventListener('DOMContentLoaded', function () {

  try {

    cur = 0;
    score = 0;
    secs = T_START;
    tOn = false;
    answered = false;
    streak = 0;
    bestStreak = 0;
    marked.clear();

    initQ();

    if (localStorage.getItem('sr_access') === 'granted') {
      document.getElementById("gate").style.display = "none";
      loadQ();
      startTimer();
    }

  } catch(e) {
    console.log("Startup error:", e);
  }

});

</script>
