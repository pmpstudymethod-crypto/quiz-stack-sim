<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack 1 | PMP Study Method</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.app {
  max-width: 700px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  margin-bottom: 10px;
}

#timer {
  font-size: 18px;
  margin-bottom: 15px;
}

.choice {
  display: block;
  padding: 10px;
  margin: 8px 0;
  background: #eee;
  border: none;
  cursor: pointer;
  width: 100%;
  text-align: left;
}

.choice:hover {
  background: #ddd;
}

.cor { background: #c8f7c5 !important; }
.wrg { background: #f7c5c5 !important; }
.dim { opacity: 0.6; }

#nextBtn {
  margin-top: 15px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="app">

  <h2>Stack 1</h2>

  <div id="timer">19:30</div>

  <div id="qText">Loading question...</div>
  <div id="choices"></div>

  <button id="nextBtn" onclick="nextQ()">Next</button>

</div>

<script>

/* =========================
   SAMPLE QUESTIONS
   (Replace with your real QS if needed)
========================= */
const QS = [
  {
    q: "What should a project manager do first when a risk is identified?",
    c: ["Ignore it", "Document it", "Escalate immediately", "Close the project"],
    a: 1
  },
  {
    q: "What is the primary purpose of a project charter?",
    c: ["Define scope", "Authorize project", "Assign tasks", "Close project"],
    a: 1
  }
];

const T_START = 19 * 60 + 30;

let cur = 0;
let score = 0;
let secs = T_START;
let answered = false;
let order = [];
let timerInt = null;

/* =========================
   SHUFFLE
========================= */
function shfl(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================
   INIT
========================= */
function initQ(){
  order = shfl([...Array(QS.length).keys()]);
}

/* =========================
   LOAD QUESTION
========================= */
function loadQ(){

  const q = QS[order[cur]];
  if(!q) return;

  document.getElementById("qText").innerText = q.q;

  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  q.c.forEach((choice,i)=>{
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<b>${String.fromCharCode(65+i)}.</b> ${choice}`;
    btn.onclick = ()=>select(i);
    choices.appendChild(btn);
  });

}

/* =========================
   SELECT
========================= */
function select(i){

  if(answered) return;

  answered = true;

  const q = QS[order[cur]];
  const choices = document.querySelectorAll(".choice");

  choices.forEach((c,idx)=>{
    if(idx === q.a){
      c.classList.add("cor");
    } else if(idx === i){
      c.classList.add("wrg");
    } else {
      c.classList.add("dim");
    }
  });

  if(i === q.a){
    score++;
  }

}

/* =========================
   NEXT
========================= */
function nextQ(){

  cur++;
  answered = false;

  if(cur >= QS.length){
    alert("Finished!");
    return;
  }

  loadQ();
}

/* =========================
   TIMER
========================= */
function startTimer(){

  if(timerInt) return;

  timerInt = setInterval(()=>{
    secs--;

    document.getElementById("timer").innerText = secs;

    if(secs <= 0){
      clearInterval(timerInt);
      alert("Time's up!");
    }

  },1000);
}

/* =========================
   AUTO START (NO GATE)
========================= */
document.addEventListener('DOMContentLoaded', function () {
  initQ();
  loadQ();
  startTimer();
});

</script>

</body>
</html>
