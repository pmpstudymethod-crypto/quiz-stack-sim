<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack 1 | PMP Study Method</title>
</head>

<body>

<div id="app" style="display:flex; flex-direction:column; max-width:700px; margin:auto;">

<h2>Stack 1</h2>

<div id="qText"></div>
<div id="choicesEl"></div>

<button onclick="nextQ()">Next</button>

</div>

<script>

// ✅ REAL QUESTIONS (REPLACE WITH YOUR FULL SET IF NEEDED)
var QS = [
  {
    q: "A project manager is assigned to a new project with unclear requirements. What should they do first?",
    c: [
      "Begin execution immediately",
      "Identify stakeholders and gather requirements",
      "Create a budget",
      "Assign team members"
    ],
    a: 1
  },
  {
    q: "A stakeholder requests a major change during execution. What should the project manager do?",
    c: [
      "Approve it immediately",
      "Reject the request",
      "Follow the change control process",
      "Ignore the request"
    ],
    a: 2
  }
];

// ================= VARIABLES =================
var cur = 0;
var score = 0;
var order = [];

// ================= SHUFFLE =================
function shfl(arr){
  return arr.sort(() => Math.random() - 0.5);
}

// ================= INIT =================
function initQ(){
  order = shfl([...Array(QS.length).keys()]);
}

// ================= LOAD =================
function loadQ(){
  var qi = order[cur];
  var q = QS[qi];

  document.getElementById('qText').textContent = q.q;

  var el = document.getElementById('choicesEl');
  el.innerHTML = '';

  q.c.forEach((choice, i) => {
    var btn = document.createElement('button');
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(i, q.a);
    el.appendChild(btn);
  });
}

// ================= CHECK =================
function checkAnswer(i, correct){
  if(i === correct){
    score++;
    alert("Correct");
  } else {
    alert("Wrong");
  }
}

// ================= NEXT =================
function nextQ(){
  cur++;
  if(cur >= QS.length){
    alert("Done. Score: " + score);
    return;
  }
  loadQ();
}

// ✅ AUTO START (THIS FIXES YOUR ISSUE)
document.addEventListener('DOMContentLoaded', function () {
  initQ();
  loadQ();
});

</script>

</body>
</html>
