<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stack 1 | PMP Study Method</title>

<!-- KEEP YOUR ORIGINAL STYLE (PASTE YOUR FULL STYLE BLOCK ABOVE THIS IF NEEDED) -->

</head>
<body>

<!-- KEEP YOUR ORIGINAL APP STRUCTURE -->
<div id="app" class="app" style="display:flex;">

  <!-- HEADER / TIMER / UI stays exactly as your file -->

  <div class="card-zone">
    <div class="q-card">

      <div id="qText"></div>
      <div id="choicesEl"></div>

    </div>
  </div>

  <div class="action-bar">
    <button class="next-btn" id="nextBtn" onclick="nextQ()">Next →</button>
  </div>

</div>

<script>

// ============================
// 🔴 USE YOUR REAL QUESTIONS
// ============================

var QS = typeof QS !== "undefined" ? QS : [
  {
    q: "Replace with your real Stack 1 questions",
    c: ["A","B","C","D"],
    a: 0
  }
];

// ============================
// VARIABLES
// ============================

var cur = 0;
var score = 0;
var order = [];
var answered = false;

// ============================
// SHUFFLE
// ============================

function shfl(arr){
  return arr.sort(() => Math.random() - 0.5);
}

// ============================
// INIT
// ============================

function initQ(){
  order = shfl([...Array(QS.length).keys()]);
}

// ============================
// LOAD QUESTION (REAL FIX)
// ============================

function loadQ(){
  var qi = order[cur];
  var q = QS[qi];

  answered = false;

  document.getElementById('qText').innerText = "Q " + (cur+1) + " of " + QS.length + ": " + q.q;

  var el = document.getElementById('choicesEl');
  el.innerHTML = '';

  q.c.forEach((choice, i) => {
    var btn = document.createElement('button');
    btn.className = "choice";
    btn.innerText = choice;

    btn.onclick = function(){

      if(answered) return;
      answered = true;

      if(i === q.a){
        btn.classList.add("cor");
        score++;
      } else {
        btn.classList.add("wrg");
      }

      document.getElementById('nextBtn').classList.add("on");
    };

    el.appendChild(btn);
  });

  document.getElementById('nextBtn').classList.remove("on");
}

// ============================
// NEXT
// ============================

function nextQ(){
  cur++;

  if(cur >= QS.length){
    finish();
    return;
  }

  loadQ();
}

// ============================
// FINISH
// ============================

function finish(){
  alert("Score: " + Math.round((score/QS.length)*100) + "%");
}

// ============================
// 🔥 CRITICAL FIX (YOUR ISSUE)
// ============================

document.addEventListener('DOMContentLoaded', function(){

  // REMOVE GATE VISUALLY (WITHOUT DELETING IT)
  var gate = document.querySelector('.gate');
  if(gate) gate.style.display = "none";

  var upsell = document.querySelector('.upsell');
  if(upsell) upsell.style.display = "none";

  // FORCE APP VISIBLE
  var app = document.getElementById('app');
  if(app) app.style.display = "flex";

  // RESET STATE
  cur = 0;
  score = 0;

  // LOAD QUESTIONS
  initQ();
  loadQ();

});

</script>

</body>
</html>
