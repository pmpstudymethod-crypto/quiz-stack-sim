<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Simulation | PMP Study Method</title>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" style="text-align:center; margin-top:100px;">

  <h2>Full Exam Simulation</h2>

  <!-- ✅ BUTTON FIX INCLUDED -->
  <button class="start-btn" onclick="beginExam()">
    Begin Exam Simulation →
  </button>

</div>

<!-- APP -->
<div id="app" style="display:none; max-width:700px; margin:auto;">

  <div id="timer" style="font-size:24px;">2400</div>

  <div id="qText"></div>
  <div id="choices"></div>

  <button id="nextBtn" onclick="nextQ()">Next</button>

</div>

<!-- RESULTS -->
<div id="results" style="display:none; text-align:center;">
  <h2>Score: <span id="finalScore"></span></h2>
</div>

<script>

const T_START = 2400;

let cur = 0;
let score = 0;
let secs = T_START;
let answered = false;
let order = [];
let timerInt = null;

/* =========================
   SHUFFLE
========================= */
function shfl(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================
   INIT
========================= */
function initQ(){
  order = shfl([...Array(QS.length).keys()]);
}

/* =========================
   LOAD QUESTION
========================= */
function loadQ(){

  const q = QS[order[cur]];
  if(!q) return;

  document.getElementById("qText").innerText = q.q;

  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  q.c.forEach((choice,i)=>{
    const btn = document.createElement("button");
    btn.innerHTML = `<b>${String.fromCharCode(65+i)}.</b> ${choice}`;
    btn.onclick = ()=>select(i);
    choices.appendChild(btn);
  });

}

/* =========================
   SELECT
========================= */
function select(i){

  if(answered) return;

  answered = true;

  const q = QS[order[cur]];

  if(i === q.a){
    score++;
  }

}

/* =========================
   NEXT
========================= */
function nextQ(){

  cur++;
  answered = false;

  if(cur >= QS.length){
    finish();
    return;
  }

  loadQ();
}

/* =========================
   TIMER
========================= */
function startTimer(){

  if(timerInt) return;

  timerInt = setInterval(()=>{
    secs--;

    document.getElementById("timer").innerText = secs;

    if(secs <= 0){
      clearInterval(timerInt);
      finish();
    }

  },1000);
}

/* =========================
   START EXAM
========================= */
function beginExam(){

  document.getElementById("startScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  cur = 0;
  score = 0;
  secs = T_START;
  answered = false;

  initQ();
  loadQ();
  startTimer();
}

/* =========================
   FINISH
========================= */
function finish(){

  clearInterval(timerInt);

  document.getElementById("app").style.display = "none";
  document.getElementById("results").style.display = "block";

  const pct = Math.round((score / QS.length) * 100);

  document.getElementById("finalScore").innerText = pct + "%";
}

</script>

</body>
</html>
