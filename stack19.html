<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack 19 | PMP Study Method</title>
</head>

<body>

<div id="app" style="display:flex; flex-direction:column; max-width:700px; margin:auto;">

<h2>Stack 19</h2>

<div id="qText"></div>
<div id="choicesEl"></div>

<button onclick="nextQ()">Next</button>

</div>

<script>

var QS = typeof QS !== "undefined" ? QS : [
  {
    q: "Replace with Stack 19 question",
    c: ["A","B","C","D"],
    a: 0
  }
];

var cur = 0;
var score = 0;
var order = [];

function shfl(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function initQ(){
  order = shfl([...Array(QS.length).keys()]);
}

function loadQ(){
  var qi = order[cur];
  var q = QS[qi];

  document.getElementById('qText').textContent = q.q;

  var el = document.getElementById('choicesEl');
  el.innerHTML = '';

  q.c.forEach((choice, i) => {
    var btn = document.createElement('button');
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(i, q.a);
    el.appendChild(btn);
  });
}

function checkAnswer(i, correct){
  if(i === correct){
    score++;
    alert("Correct");
  } else {
    alert("Wrong");
  }
}

function nextQ(){
  cur++;
  if(cur >= QS.length){
    alert("Done. Score: " + score);
    return;
  }
  loadQ();
}

document.addEventListener('DOMContentLoaded', function () {
  try {
    initQ();
    loadQ();
  } catch(e) {
    console.log("Startup error:", e);
  }
});

</script>

</body>
</html>
